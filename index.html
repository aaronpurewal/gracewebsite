<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grace Wong — Animator & Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://use.typekit.net/opd1lbn.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Variables ────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #203466;
      --navy-light: #8a95a8;
      --bg-outer: #ffffff;
      --bg-card: #ffffff;
      --bg-project-thumb: #eeeeee;
      --circle-mint: #ACF7F6;
      --circle-green: #B6F7AC;
      --circle-yellow: #F9FFB8;
      --accent-teal: #ACF7F6;
      --font-serif: "minion-pro", serif;
      --font-sans: 'DM Sans', system-ui, sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-outer);
      color: var(--navy);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--navy); text-decoration: none; }
    a:focus-visible { outline: 2px solid var(--navy); outline-offset: 2px; border-radius: 2px; }
    img { display: block; max-width: 100%; }

    /* ── Page wrapper ─────────────────────────────── */
    .page-wrapper {
      position: relative;
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-label {
      display: none;
    }

    .card {
      background: var(--bg-card);
      padding: 20px 28px;
      min-height: 100vh;
      position: relative;
    }

    .card.home-card {
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
    }

    .card.home-card #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .card.teal-bg {
      background: var(--accent-teal);
    }

    /* ── Header ───────────────────────────────────── */
    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2vh;
      flex-shrink: 0;
    }

    .breadcrumb {
      font-family: var(--font-serif);
      font-size: 20px;
    }

    .breadcrumb a {
      font-style: italic;
    }

    .breadcrumb .sep {
      font-style: normal;
      margin: 0 6px;
    }

    .breadcrumb .current {
      font-style: italic;
    }

    /* ── Hamburger ─────────────────────────────────── */
    .hamburger {
      background: none;
      border: none;
      cursor: pointer;
      width: 28px;
      height: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 0;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--navy);
      border-radius: 1px;
    }

    .hamburger:focus-visible {
      outline: 2px solid var(--navy);
      outline-offset: 4px;
      border-radius: 2px;
    }

    /* ── Nav Overlay ──────────────────────────────── */
    .nav-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-card);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms ease;
    }

    .nav-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .nav-overlay .close-btn {
      position: absolute;
      top: 24px;
      right: 28px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 28px;
      color: var(--navy);
      font-family: var(--font-sans);
      line-height: 1;
    }

    .nav-overlay .close-btn:focus-visible {
      outline: 2px solid var(--navy);
      outline-offset: 4px;
      border-radius: 2px;
    }

    .nav-overlay nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .nav-overlay nav a {
      font-family: var(--font-serif);
      font-size: 36px;
      font-style: italic;
      color: var(--navy);
      transition: opacity 200ms ease;
    }

    .nav-overlay nav a:hover {
      opacity: 0.6;
    }

    .nav-overlay nav a.active {
      font-weight: 700;
    }

    /* ── Footer ───────────────────────────────────── */
    .site-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0 8px;
      margin-top: 48px;
      border-top: 1px solid #ddd;
      font-family: var(--font-sans);
      font-size: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .site-footer a { transition: opacity 200ms ease; }
    .site-footer a:hover { opacity: 0.6; }
    .footer-links { display: flex; gap: 6px; align-items: center; }
    .footer-links .pipe { color: var(--navy-light); }

    /* ── Floating Circles ─────────────────────────── */
    .circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.75;
      z-index: 5;
      pointer-events: none;
      animation: floatCircle 5s ease-in-out infinite;
    }

    @keyframes floatCircle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    /* ── Work page decorative rectangles ──────────── */
    .deco-rect {
      position: absolute;
      background: var(--circle-green);
      opacity: 0.6;
      z-index: 5;
      pointer-events: none;
      animation: floatCircle 5s ease-in-out infinite;
    }

    /* ── Image containers ─────────────────────────── */
    .img-container {
      position: relative;
      overflow: hidden;
      border-radius: 2px;
    }

    .img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 200ms ease;
    }

    .img-container:hover img {
      transform: scale(1.02);
    }

    .img-number {
      position: absolute;
      top: 10px;
      right: 12px;
      font-family: var(--font-sans);
      font-size: 13px;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      z-index: 2;
    }

    .img-overlay {
      position: absolute;
      font-family: var(--font-sans);
      font-size: 14px;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      z-index: 2;
    }

    .img-overlay a { color: white; }

    /* ── Home page ────────────────────────────────── */
    .home-content {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .hero-row {
      display: flex;
      gap: 8px;
      width: 62%;
      flex: 0 0 25vh;
    }

    .hero-row .img-container { flex: 1; }

    .bio-section {
      max-width: 72%;
      margin: 0;
      padding: 2vh 0;
      flex: 0 0 auto;
    }

    .bio-section p {
      font-family: var(--font-serif);
      font-size: clamp(16px, 1.6vw, 24px);
      font-weight: 500;
      line-height: 1.4;
      color: var(--navy);
      margin-bottom: 1.2vh;
    }

    .bottom-row {
      display: flex;
      justify-content: space-between;
      flex: 1;
      min-height: 0;
    }

    .bottom-row .img-container {
      width: 32%;
    }

    .site-footer.home-footer {
      margin-top: auto;
      padding: 10px 0 4px;
      border-top: none;
    }

    /* ── Work page ────────────────────────────────── */
    .filters {
      display: flex;
      gap: 24px;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-serif);
      font-size: 20px;
      color: var(--navy);
      padding: 0;
    }

    .filter-btn:focus-visible {
      outline: 2px solid var(--navy);
      outline-offset: 4px;
      border-radius: 2px;
    }

    .project-grid-row1 {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .project-card {
      position: relative;
      cursor: pointer;
      transition: transform 200ms ease, box-shadow 200ms ease;
      display: block;
    }

    .project-card:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    .project-card:focus-visible {
      outline: 2px solid var(--navy);
      outline-offset: 4px;
      border-radius: 2px;
    }

    .project-thumb {
      width: 100%;
      height: 100%;
      background: var(--bg-project-thumb);
      border-radius: 4px;
    }

    .project-info {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 12px 0 0;
    }

    .project-title {
      font-family: var(--font-serif);
      font-size: 22px;
      font-style: italic;
    }

    .project-tag {
      font-family: var(--font-sans);
      font-size: 14px;
      text-align: right;
      color: var(--navy);
    }

    .project-grid-row2 {
      display: flex;
      gap: 20px;
    }

    .project-grid-row2 .project-card { flex: 1; }

    /* ── Play page ────────────────────────────────── */
    .masonry {
      column-count: 3;
      column-gap: 14px;
    }

    .masonry .masonry-item {
      break-inside: avoid;
      margin-bottom: 14px;
      overflow: hidden;
      border-radius: 2px;
    }

    .masonry .masonry-item img {
      width: 100%;
      display: block;
      transition: filter 200ms ease;
    }

    .masonry .masonry-item:hover img {
      filter: brightness(1.05);
    }

    /* ── About page ───────────────────────────────── */
    .about-layout {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    .about-text {
      flex: 0 0 60%;
    }

    .about-text p {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 500;
      line-height: normal;
      color: var(--navy);
      margin-bottom: 20px;
    }

    .about-image {
      flex: 0 0 35%;
      height: 400px;
      background: var(--bg-project-thumb);
      border-radius: 4px;
      overflow: hidden;
    }

    .about-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── Witching Hour detail ─────────────────────── */
    .project-detail-tags {
      display: flex;
      gap: 24px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .project-detail-tags span {
      font-family: var(--font-serif);
      font-size: 20px;
      color: var(--navy);
    }

    .project-placeholder {
      text-align: center;
      padding: 120px 0;
      font-family: var(--font-serif);
      font-size: 22px;
      font-style: italic;
      color: var(--navy-light);
    }

    /* ── Page enter animation ─────────────────────── */
    .page-enter {
      animation: fadeIn 300ms ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ── Reduced motion ───────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .circle, .deco-rect { animation: none; }
      .page-enter { animation: none; }
      .nav-overlay { transition: none; }
      .img-container img { transition: none; }
      .project-card { transition: none; }
      .masonry .masonry-item img { transition: none; }
    }

    /* ── Responsive: Tablet ───────────────────────── */
    @media (max-width: 1024px) {
      .card { padding: 20px; }
      .page-label { padding-left: 20px; }
      .hero-row { width: 80%; }
    }

    /* ── Responsive: Mobile ───────────────────────── */
    @media (max-width: 768px) {
      .page-wrapper { padding: 32px 0 0; }
      .card { padding: 16px; }
      .page-label { padding-left: 16px; }

      .hero-row {
        flex-direction: column;
        width: 100%;
      }

      .hero-row .img-container { height: 240px; }

      .bottom-row {
        flex-direction: column;
      }

      .bottom-row .img-container {
        width: 100%;
        height: 280px;
      }

      .project-grid-row1 {
        flex-direction: column;
      }

      .project-grid-row1 .project-card {
        width: 100% !important;
      }

      .project-grid-row2 {
        flex-direction: column;
      }

      .masonry {
        column-count: 2;
      }

      .about-layout {
        flex-direction: column;
      }

      .about-text { flex: 1; }
      .about-image { flex: 1; width: 100%; height: 300px; }

      .filters { gap: 16px; }

      .breadcrumb { font-size: 17px; }
    }
  </style>
</head>
<body>

  <!-- Nav Overlay -->
  <div class="nav-overlay" id="navOverlay" role="dialog" aria-label="Navigation menu">
    <button class="close-btn" aria-label="Close navigation" onclick="closeNav()">&times;</button>
    <nav>
      <a href="#/" id="nav-home">Home</a>
      <a href="#/work" id="nav-work">Work</a>
      <a href="#/play" id="nav-play">Play</a>
      <a href="#/about" id="nav-about">Who am I?</a>
    </nav>
  </div>

  <div class="page-wrapper" id="pageWrapper">
    <div class="page-label" id="pageLabel"></div>
    <div class="card" id="card">
      <main id="app" class="page-enter"></main>
    </div>
  </div>

  <script>
    /* ── Helpers ──────────────────────────────────── */
    function openNav() {
      var overlay = document.getElementById('navOverlay');
      overlay.classList.add('open');
      overlay.querySelector('.close-btn').focus();
      updateActiveNav();
    }

    function closeNav() {
      document.getElementById('navOverlay').classList.remove('open');
    }

    function updateActiveNav() {
      var hash = location.hash || '#/';
      document.querySelectorAll('.nav-overlay nav a').forEach(function(a) {
        a.classList.remove('active');
        if (a.getAttribute('href') === hash) a.classList.add('active');
        if (hash.startsWith('#/work') && a.getAttribute('href') === '#/work') a.classList.add('active');
      });
    }

    // Close nav on link click
    document.querySelectorAll('.nav-overlay nav a').forEach(function(a) {
      a.addEventListener('click', function() { closeNav(); });
    });

    // Close nav on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeNav();
    });

    /* ── Shared components ────────────────────────── */
    function headerHTML(breadcrumbs) {
      var parts = breadcrumbs.map(function(b, i) {
        if (i === breadcrumbs.length - 1 && breadcrumbs.length > 1) {
          return '<span class="current">' + b.label + '</span>';
        }
        return '<a href="' + b.href + '">' + b.label + '</a>';
      });
      return '<header class="site-header">' +
        '<div class="breadcrumb">' + parts.join('<span class="sep">/</span>') + '</div>' +
        '<button class="hamburger" aria-label="Open navigation" onclick="openNav()">' +
        '<span></span><span></span><span></span>' +
        '</button></header>';
    }

    function footerHTML() {
      return '<footer class="site-footer">' +
        '<span>[2026]</span>' +
        '<div class="footer-links">' +
        '<a href="https://linkedin.com" target="_blank" rel="noopener">LinkedIn</a>' +
        '<span class="pipe">|</span>' +
        '<a href="https://instagram.com" target="_blank" rel="noopener">Instagram</a>' +
        '<span class="pipe">|</span>' +
        '<a href="mailto:hello@gracewong.com">Contact</a>' +
        '</div></footer>';
    }

    /* ── Circles ──────────────────────────────────── */
    function circlesHTML(circles) {
      return circles.map(function(c) {
        var colorMap = { mint: 'var(--circle-mint)', green: 'var(--circle-green)', yellow: 'var(--circle-yellow)' };
        var bg = colorMap[c.color] || c.color;
        return '<div class="circle" style="' +
          'width:' + c.size + 'px; height:' + c.size + 'px;' +
          'background:' + bg + ';' +
          'top:' + c.top + '; left:' + (c.left || 'auto') + '; right:' + (c.right || 'auto') + ';' +
          'animation-delay:' + (c.delay || '0s') + ';' +
          '"></div>';
      }).join('');
    }

    function decoRectsHTML() {
      var rects = [
        { w: 80, h: 80, top: '40px',  right: '60px',  rot: 12,  delay: '0s' },
        { w: 70, h: 70, top: '140px', right: '30px',  rot: -8,  delay: '0.8s' },
        { w: 75, h: 75, top: '240px', right: '80px',  rot: 20,  delay: '1.6s' },
        { w: 65, h: 65, top: '350px', right: '20px',  rot: -15, delay: '2.4s' },
        { w: 80, h: 80, top: '460px', right: '60px',  rot: 10,  delay: '3.2s' },
        { w: 70, h: 70, top: '560px', right: '40px',  rot: -5,  delay: '4s' },
      ];
      return rects.map(function(r) {
        return '<div class="deco-rect" style="' +
          'width:' + r.w + 'px; height:' + r.h + 'px;' +
          'top:' + r.top + '; right:' + r.right + ';' +
          'transform: rotate(' + r.rot + 'deg);' +
          'animation-delay:' + r.delay + ';' +
          'border-radius: 4px;' +
          '"></div>';
      }).join('');
    }

    /* ── Pages ────────────────────────────────────── */

    function homePage() {
      var homeCircles = [
        { color: 'mint',   size: 85, top: '7%',   left: '17%',  delay: '0s' },
        { color: 'yellow', size: 85, top: '13%',  left: '1%',   delay: '0.7s' },
        { color: 'mint',   size: 85, top: '31%',  left: '33%',  delay: '1.4s' },
        { color: 'green',  size: 85, top: '21%',  right: '9%',  delay: '2.1s' },
        { color: 'mint',   size: 85, top: '33%',  right: '18%', delay: '2.8s' },
        { color: 'green',  size: 85, top: '76%',  left: '3%',   delay: '3.5s' },
        { color: 'mint',   size: 85, top: '80%',  left: '39%',  delay: '4.2s' },
        { color: 'yellow', size: 85, top: '72%',  right: '24%', delay: '4.9s' },
      ];

      // Add home-card class to card
      document.getElementById('card').classList.add('home-card');

      return circlesHTML(homeCircles) +
        headerHTML([{ label: 'gracewong', href: '#/' }]) +

        '<div class="home-content">' +
        '<section class="hero-row" aria-label="Featured images">' +
          '<div class="img-container">' +
            '<img src="images/hero-left.jpg" alt="Teal metal security gate on a street scene">' +
          '</div>' +
          '<div class="img-container">' +
            '<img src="images/hero-right.jpg" alt="Bathroom interior with striped shower curtain, sink, and mirror">' +
            '<span class="img-number">001</span>' +
            '<a href="#/work" class="img-overlay" style="bottom:16px; left:50%; transform:translateX(-50%); white-space:nowrap;">(____Work)</a>' +
          '</div>' +
        '</section>' +

        '<section class="bio-section">' +
          '<p>Hi, I\'m Grace, a 2D animator and designer. I bring motion thinking and visual intuition to every stage of design, making interfaces that are intuitive, expressive, and alive.</p>' +
          '<p>I lead with curiosity about people, about stories, about what makes us want to connect. Outside of design, I bake, I model, and I move fluidly between whatever calls to me creatively. I\'ve appeared in Paper Magazine, Dazed, and Vogue; my animation work has been featured at film festivals, including Interfilm in Berlin - and I carry that same eye for beauty and intention into everything I make.</p>' +
        '</section>' +

        '<section class="bottom-row" aria-label="Explore more">' +
          '<div class="img-container">' +
            '<img src="images/home-play.jpg" alt="Pink pedestal with ceramic object and wooden chair in a sunlit room">' +
            '<span class="img-number">002</span>' +
            '<a href="#/play" class="img-overlay" style="bottom:16px; left:50%; transform:translateX(-50%); white-space:nowrap;">(this is how__I__PLAY)</a>' +
          '</div>' +
          '<div class="img-container">' +
            '<img src="images/home-about.jpg" alt="Person wearing polka dot top and brown suede jacket, shot from behind">' +
            '<span class="img-number">003</span>' +
            '<a href="#/about" class="img-overlay" style="top:50%; left:24px; transform:translateY(-50%);">*Who am I?</a>' +
          '</div>' +
        '</section>' +
        '</div>' +

        '<footer class="site-footer home-footer">' +
          '<span>[2026]</span>' +
          '<div class="footer-links">' +
          '<a href="https://linkedin.com" target="_blank" rel="noopener">LinkedIn</a>' +
          '<span class="pipe">|</span>' +
          '<a href="https://instagram.com" target="_blank" rel="noopener">Instagram</a>' +
          '<span class="pipe">|</span>' +
          '<a href="mailto:hello@gracewong.com">Contact</a>' +
          '</div></footer>';
    }

    /* ── Work state ───────────────────────────────── */
    var activeFilter = 'Animation';

    function workPage() {
      var filters = ['Animation', 'Creative direction', 'Product design'];
      var isTeal = activeFilter === 'Creative direction';

      var card = document.getElementById('card');
      card.classList.toggle('teal-bg', isTeal);

      var filterBtns = filters.map(function(f) {
        var label = f === activeFilter ? '[' + f + ']' : f;
        return '<button class="filter-btn" onclick="setFilter(\'' + f + '\')">' + label + '</button>';
      }).join('');

      return decoRectsHTML() +
        headerHTML([
          { label: 'gracewong', href: '#/' },
          { label: 'Work', href: '#/work' },
        ]) +

        '<div class="filters" role="group" aria-label="Filter projects by category">' +
          filterBtns +
        '</div>' +

        '<div class="project-grid-row1">' +
          '<a href="#/work/witching-hour" class="project-card" style="flex:0 0 55%; height:350px;" tabindex="0">' +
            '<div class="project-thumb"></div>' +
            '<div class="project-info">' +
              '<span class="project-title">Witching Hour</span>' +
              '<span class="project-tag">2D Animation</span>' +
            '</div>' +
          '</a>' +
          '<a href="#/work/animation-reel" class="project-card" style="flex:0 0 40%; height:250px;" tabindex="0">' +
            '<div class="project-thumb"></div>' +
            '<div class="project-info">' +
              '<span class="project-title">Animation reel</span>' +
              '<span class="project-tag">2D Animation, Motion Design</span>' +
            '</div>' +
          '</a>' +
        '</div>' +

        '<div class="project-grid-row2">' +
          '<div class="project-card">' +
            '<div class="project-thumb" style="height:200px;"></div>' +

    /* ── Router ───────────────────────────────────── */
    var routes = {
      '/':                    { page: homePage,           label: 'Home' },
      '/home':                { page: homePage,           label: 'Home' },
      '/work':                { page: workPage,           label: 'Work' },
      '/work/witching-hour':  { page: witchingHourPage,   label: 'Witching Hour' },
      '/work/animation-reel': { page: animationReelPage,  label: 'Animation Reel' },
      '/play':                { page: playPage,           label: 'Play' },
      '/about':               { page: aboutPage,          label: 'Who am I?' },
    };

    function render() {
      var hash = (location.hash || '#/').slice(1);
      var route = routes[hash] || routes['/'];

      // Reset card classes
      var card = document.getElementById('card');
      card.classList.remove('teal-bg');
      card.classList.remove('home-card');

      // Set page label
      document.getElementById('pageLabel').textContent = route.label;

      // Render page content using DOM methods
      var app = document.getElementById('app');
      // All page content is generated from hardcoded templates - no user input
      app.innerHTML = route.page();
      app.classList.remove('page-enter');
      void app.offsetWidth; // force reflow for animation restart
      app.classList.add('page-enter');

      // Scroll to top
      window.scrollTo(0, 0);
      updateActiveNav();
    }

    window.addEventListener('hashchange', render);
    window.addEventListener('DOMContentLoaded', function() {
      if (!location.hash) location.hash = '#/';
      render();
    });
  </script>
